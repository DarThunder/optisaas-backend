# Los valores ${...} se leen del archivo .env (NO commitear .env). Ver .env.example.
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres-db:5432/optisaas_core
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-Lax}
      DDL_AUTO: ${DDL_AUTO:-validate}
      SEED_ENABLED: ${SEED_ENABLED:-true}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      # URL para los enlaces dentro de los correos (distinta de la lista de CORS de arriba).
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:3000}
      # Cuenta de plataforma: sin esto, una base con SEED_ENABLED=false arranca sin NINGÚN
      # usuario y no hay forma de entrar. Esta lista es explícita, así que una variable que
      # esté en el .env pero no aquí simplemente no llega al contenedor y falla en silencio.
      PLATFORM_ADMIN_USERNAME: ${PLATFORM_ADMIN_USERNAME:-}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-}
      PLATFORM_ADMIN_NAME: ${PLATFORM_ADMIN_NAME:-Administrador de plataforma}
      BRAND_NAME: ${BRAND_NAME:-Fóvea}
      BRAND_MAKER: ${BRAND_MAKER:-VLK}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-log}
      MAIL_FROM: ${MAIL_FROM:-no-reply@fovea.com.mx}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.example.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      postgres-db:
        condition: service_healthy
  postgres-db:
    image: postgres:16-alpine
    container_name: optisaas-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: optisaas_core
    ports:
      # Solo accesible desde la propia máquina (no expuesto a la red/LAN). En prod se
      # elimina por completo con docker-compose.prod.yml.
      # Puerto del HOST configurable (DB_HOST_PORT): por defecto 5433 para no chocar con
      # un PostgreSQL nativo que ocupe el 5432. La app NO usa este puerto: se conecta por
      # la red interna de Docker a postgres-db:5432.
      - "127.0.0.1:${DB_HOST_PORT:-5433}:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d optisaas_core"]
      interval: 5s
      timeout: 5s
      retries: 5
