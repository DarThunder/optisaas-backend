# Perfil 'test'. Solo cubre los dos secretos que producción exige por entorno y que, sin
# valor, romperían la resolución de propiedades. No son secretos reales.
#
# Va como application-TEST.properties, no como application.properties: un archivo con ese
# nombre en src/test/resources oculta por completo al de src/main (Maven pone test-classes
# antes en el classpath), dejando el contexto sin datasource ni el resto de app.*. Como
# perfil, se carga ENCIMA del de src/main en vez de reemplazarlo.
#
# Los ${...:default} respetan las variables del CI cuando existen.
app.jwtSecret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
app.cookie.secure=${COOKIE_SECURE:false}
spring.datasource.password=${DB_PASSWORD:test}
