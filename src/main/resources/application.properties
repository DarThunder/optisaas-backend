spring.application.name=optisaas
spring.datasource.username=${DB_USER:opti_admin}
# Secreto: sin valor por defecto. Debe inyectarse por entorno (ver .env.example).
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres-db:5432/optisaas_core}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# El esquema lo gestiona Flyway (migraciones versionadas). Hibernate solo VALIDA que las
# entidades coincidan con el esquema; ya no aplica DDL automático. Configurable por entorno.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}

# --- Flyway (esquema versionado) ---
spring.flyway.enabled=true
# Adopta como baseline (V1) el esquema ya existente en DBs previas a Flyway, sin re-crearlo.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Secreto de firma JWT: SIN valor por defecto a propósito. El arranque falla si
# JWT_SECRET no está definido, para evitar usar un secreto conocido/commiteado.
# Genera uno nuevo con: openssl rand -base64 32
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=86400000
app.jwtCookieName=optisaas-auth-token
server.port=${PORT:8080}
app.frontend.url=${FRONTEND_URL:http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://127.0.0.1:3000}
# SameSite de las cookies. 'Lax' si frontend y backend comparten dominio (recomendado).
# Si van en dominios distintos en prod, usar 'None' (requiere COOKIE_SECURE=true).
app.cookie.sameSite=${COOKIE_SAMESITE:Lax}
# true en producción (exige HTTPS). Configurable por entorno para desarrollo local.
app.cookie.secure=${COOKIE_SECURE:false}
# Carga de datos de ejemplo (DataSeeder). En producción: false.
app.seed.enabled=${SEED_ENABLED:true}

# Actuator: exponer solo lo mínimo por HTTP (salud). Ajustable por entorno.
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSE:health}
management.endpoint.health.show-details=never