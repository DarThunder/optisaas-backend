spring.application.name=optisaas
spring.datasource.username=${DB_USER:opti_admin}
# Secreto: sin valor por defecto. Debe inyectarse por entorno (ver .env.example).
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres-db:5432/optisaas_core}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# El esquema lo gestiona Flyway (migraciones versionadas). Hibernate solo VALIDA que las
# entidades coincidan con el esquema; ya no aplica DDL automático. Configurable por entorno.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}

# --- Flyway (esquema versionado) ---
spring.flyway.enabled=true
# Adopta como baseline (V1) el esquema ya existente en DBs previas a Flyway, sin re-crearlo.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Secreto de firma JWT: SIN valor por defecto a propósito. El arranque falla si
# JWT_SECRET no está definido, para evitar usar un secreto conocido/commiteado.
# Genera uno nuevo con: openssl rand -base64 32
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=86400000
app.jwtCookieName=optisaas-auth-token
server.port=${PORT:8080}
app.frontend.url=${FRONTEND_URL:http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://127.0.0.1:3000}
# URL pública y canónica del frontend, para los enlaces que van dentro de un correo.
# NO se puede reusar app.frontend.url: esa es la lista de orígenes permitidos para CORS y su
# primer valor no es necesariamente donde vive la app (arrastra puertos viejos). En producción
# es el dominio real.
app.frontend.publicUrl=${FRONTEND_PUBLIC_URL:http://localhost:3000}
# SameSite de las cookies. 'Lax' si frontend y backend comparten dominio (recomendado).
# Si van en dominios distintos en prod, usar 'None' (requiere COOKIE_SECURE=true).
app.cookie.sameSite=${COOKIE_SAMESITE:Lax}
# true en producción (exige HTTPS). Configurable por entorno para desarrollo local.
app.cookie.secure=${COOKIE_SECURE:false}
# Carga de datos de ejemplo (DataSeeder). En producción: false.
app.seed.enabled=${SEED_ENABLED:true}

# --- Marca ---
# Nombre del producto, tal como lo ve el cliente (asuntos y cuerpos de los correos).
# Está aquí y no escrito en las plantillas para que cambiarlo sea editar una variable.
app.brand.name=${BRAND_NAME:Fóvea}
# Quien desarrolla el producto. Aparece solo en el pie de los correos ("hecho por VLK"):
# la relación del cliente es con el producto, no con el estudio. Vacío = no se muestra.
app.brand.maker=${BRAND_MAKER:VLK}

# --- Correo ---
# 'log' (por defecto): NO envía, escribe el correo en el log. Permite usar y verificar los
# flujos sin dominio verificado. NO usar en producción: el enlace de recuperación quedaría
# en los logs. 'smtp': envía de verdad usando las propiedades spring.mail.* de abajo.
app.mail.provider=${MAIL_PROVIDER:log}
# Dirección remitente. DEBE ser de un dominio propio con SPF/DKIM configurados: poner aquí el
# correo del cliente (su Gmail) haría que los correos se rechacen o caigan en spam.
app.mail.from=${MAIL_FROM:no-reply@fovea.com.mx}
# Por defecto toma el nombre de la marca: un solo lugar donde cambiarlo.
app.mail.fromName=${MAIL_FROM_NAME:${app.brand.name}}

# Solo se usan con app.mail.provider=smtp.
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator: exponer solo lo mínimo por HTTP (salud). Ajustable por entorno.
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSE:health}
management.endpoint.health.show-details=never
# El indicador de correo se apaga a propósito. Spring Boot lo activa solo con tener la
# dependencia de mail y hace PING al SMTP: en modo 'log' (sin servidor SMTP) deja /health
# en DOWN de forma permanente. Como el proxy y Docker deciden con ese endpoint si la app
# está viva, la óptica se quedaría sin vender por no poder mandar correos — y vender no
# depende del SMTP. Un fallo de correo se ve en el log, no tumbando el punto de venta.
management.health.mail.enabled=false